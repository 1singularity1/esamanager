{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4"><i class="bi bi-shield-lock"></i> Authentification à deux facteurs</h4>

                <div class="mb-4 p-3 bg-light rounded">
                    <h6 class="text-muted">Application d'authentification</h6>
                    <div class="d-flex align-items-center justify-content-between">
                        <span class="badge bg-success"><i class="bi bi-check-circle"></i> Active</span>
                        <a href="/accounts/2fa/totp/deactivate/" class="btn btn-sm btn-outline-danger">Désactiver</a>
                    </div>
                </div>

                <div class="mb-4 p-3 bg-light rounded">
                    <h6 class="text-muted">Codes de récupération</h6>
                    <p class="small text-muted">{{ recovery_codes_count }} code(s) disponible(s)</p>
                    <div class="d-flex gap-2">
                        <a href="/accounts/2fa/recovery-codes/" class="btn btn-sm btn-outline-secondary">Afficher</a>
                        <a href="/accounts/2fa/recovery-codes/download/" class="btn btn-sm btn-outline-secondary">Télécharger</a>
                        <a href="/accounts/2fa/recovery-codes/generate/" class="btn btn-sm btn-outline-warning">Générer</a>
                    </div>
                </div>

                <a href="{% url 'core:profil' %}" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-left"></i> Retour au profil
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
