{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-danger">
            <div class="card-body text-center p-4">
                <i class="bi bi-shield-x fs-1 text-danger d-block mb-3"></i>
                <h4 class="mb-2">Désactiver le 2FA</h4>
                <p class="text-muted mb-4">Êtes-vous sûr de vouloir désactiver l'authentification à deux facteurs ?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 mb-2">
                        <i class="bi bi-shield-x"></i> Désactiver
                    </button>
                    <a href="/accounts/2fa/" class="btn btn-outline-secondary w-100">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
