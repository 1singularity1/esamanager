{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body text-center p-4">
                <i class="bi bi-shield-lock fs-1 text-primary d-block mb-3"></i>
                <h4 class="mb-1">Authentification à deux facteurs</h4>
                <p class="text-muted mb-4">Saisissez le code généré par votre application Authenticator</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="text" name="code" class="form-control form-control-lg text-center" 
                               placeholder="000000" autocomplete="one-time-code" autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-2">
                        <i class="bi bi-check-circle"></i> Connexion
                    </button>
                    <a href="/accounts/logout/" class="btn btn-outline-secondary w-100">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
