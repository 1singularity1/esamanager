{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-2"><i class="bi bi-key"></i> Codes de récupération</h4>
                <p class="text-muted mb-4">Conservez ces codes en lieu sûr. Chaque code ne peut être utilisé qu'une seule fois.</p>

                <div class="bg-light p-3 rounded font-monospace mb-4">
                    {% for code in recovery_codes %}
                        <div>{{ code.code }}</div>
                    {% endfor %}
                </div>

                <div class="d-flex gap-2">
                    <a href="/accounts/2fa/recovery-codes/download/" class="btn btn-outline-secondary flex-fill">
                        <i class="bi bi-download"></i> Télécharger
                    </a>
                    <a href="/accounts/2fa/recovery-codes/generate/" class="btn btn-outline-warning flex-fill">
                        <i class="bi bi-arrow-clockwise"></i> Générer de nouveaux codes
                    </a>
                </div>
                <a href="/accounts/2fa/" class="btn btn-outline-secondary w-100 mt-2">
                    <i class="bi bi-arrow-left"></i> Retour
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
